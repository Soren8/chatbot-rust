// Top-level build file where you can add configuration options common to all sub-projects/modules.

buildscript {
    
    repositories {
        google()
        mavenCentral()
    }
    dependencies {
        classpath 'com.android.tools.build:gradle:8.13.0'
        classpath 'com.google.gms:google-services:4.4.4'

        // NOTE: Do not place your application dependencies here; they belong
        // in the individual module build.gradle files
    }
}

apply from: "variables.gradle"

// Capacitor targets Java 21. Gradle 8.14 + AGP 8.13 are pinned in wrapper/build.gradle.
def runningJvm = JavaVersion.current()
if (runningJvm.majorVersion.toInteger() > 21) {
    throw new GradleException(
        "Android build requires JDK 21 (Capacitor/AGP pin). " +
        "Current JVM: ${runningJvm}. " +
        "Use: export JAVA_HOME=/usr/lib/jvm/java-21-openjdk-amd64 && ./gradlew ..."
    )
}

allprojects {
    repositories {
        google()
        mavenCentral()
    }
}

task clean(type: Delete) {
    delete rootProject.buildDir
}
