<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" {% if sri.bootstrap_css %}integrity="{{ sri.bootstrap_css }}" crossorigin="anonymous"{% else %}crossorigin="anonymous"{% endif %}>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body class="bg-dark text-light login-page">
    <div class="container login-container">
        <div class="row justify-content-center">
            <div class="col-12 col-md-6 col-lg-4">
                <div class="card bg-dark text-light border-secondary">
                    <div class="card-header">
                        <h1 class="text-center mb-0">Login</h1>
                    </div>
                    <div class="card-body">
                        <form action="/login" method="post">
                            <div class="mb-3">
                                <label for="username" class="form-label">Username:</label>
                                <input type="text" class="form-control bg-dark text-light border-secondary" name="username" id="username" required autofocus>
                            </div>
                            <div class="mb-3">
                                <label for="password" class="form-label">Password:</label>
                                <input type="password" class="form-control bg-dark text-light border-secondary" name="password" id="password" required>
                            </div>
                            <div class="mb-3 form-check">
                                <input type="checkbox" class="form-check-input" name="remember_device" id="remember-device">
                                <label class="form-check-label" for="remember-device">Remember this computer for 30 days</label>
                            </div>
                            <div class="d-grid">
                                <input type="submit" class="btn btn-primary" value="Login">
                            </div>
                        </form>
                        <div class="text-center mt-3">
                            <a href="/signup" class="text-decoration-none">Don't have an account? Sign up</a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <!-- jQuery and Bootstrap JS -->
    <script src="https://code.jquery.com/jquery-3.6.0.min.js" {% if sri.jquery %}integrity="{{ sri.jquery }}" crossorigin="anonymous"{% else %}crossorigin="anonymous"{% endif %}></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js" {% if sri.bootstrap_js %}integrity="{{ sri.bootstrap_js }}" crossorigin="anonymous"{% else %}crossorigin="anonymous"{% endif %}></script>
    <script>
        const AUTH_TOKEN_KEY = 'chatbot.auth_token';
        const ENC_KEY_KEY = 'chatbot.enc_key';
        const USERNAME_KEY = 'chatbot.username';
        const AUTH_SCOPE_KEY = 'chatbot.auth_scope';
        const AUTH_META_KEY = 'chatbot.auth_meta';
        const PBKDF2_ITERATIONS = 100000;
        const DERIVED_BITS = 256;
        const REMEMBER_ME_MS = 30 * 24 * 60 * 60 * 1000;

        function base64ToBytes(value) {
            const binary = atob(value);
            const out = new Uint8Array(binary.length);
            for (let i = 0; i < binary.length; i++) {
                out[i] = binary.charCodeAt(i);
            }
            return out;
        }

        function bytesToBase64(bytes) {
            let binary = '';
            for (let i = 0; i < bytes.length; i++) {
                binary += String.fromCharCode(bytes[i]);
            }
            return btoa(binary);
        }

        async function deriveStorageKey(password, saltB64) {
            const enc = new TextEncoder();
            const passwordKey = await window.crypto.subtle.importKey(
                'raw',
                enc.encode(password),
                { name: 'PBKDF2' },
                false,
                ['deriveBits']
            );
            const derivedBits = await window.crypto.subtle.deriveBits(
                {
                    name: 'PBKDF2',
                    salt: base64ToBytes(saltB64),
                    iterations: PBKDF2_ITERATIONS,
                    hash: 'SHA-256'
                },
                passwordKey,
                DERIVED_BITS
            );
            return bytesToBase64(new Uint8Array(derivedBits));
        }

        function clearStoredAuth() {
            [localStorage, sessionStorage].forEach(storage => {
                storage.removeItem(AUTH_TOKEN_KEY);
                storage.removeItem(ENC_KEY_KEY);
                storage.removeItem(USERNAME_KEY);
                storage.removeItem(AUTH_SCOPE_KEY);
                storage.removeItem(AUTH_META_KEY);
            });
        }

        function storeAuth(username, authToken, encKey, remember, authMode) {
            clearStoredAuth();
            const storage = remember ? localStorage : sessionStorage;
            const now = Date.now();
            storage.setItem(AUTH_TOKEN_KEY, authToken);
            storage.setItem(ENC_KEY_KEY, encKey);
            storage.setItem(USERNAME_KEY, username);
            storage.setItem(AUTH_SCOPE_KEY, remember ? 'local' : 'session');
            storage.setItem(AUTH_META_KEY, JSON.stringify({
                authMode: authMode,
                createdAt: now,
                expiresAt: remember ? now + REMEMBER_ME_MS : null
            }));
        }

        $('form').on('submit', async function(e) {
            e.preventDefault();
            const form = this;
            const username = $('#username').val().trim();
            const password = $('#password').val();
            const remember = $('#remember-device').is(':checked');

            if (!username || !password) {
                alert('Username and password are required.');
                return;
            }

            if (!window.crypto || !window.crypto.subtle) {
                form.submit();
                return;
            }

            try {
                const resp = await fetch(`/auth/salt/${encodeURIComponent(username)}`);
                if (!resp.ok) {
                    form.submit();
                    return;
                }

                const data = await resp.json();
                const storageKey = await deriveStorageKey(password, data.salt || data.auth_salt);

                const authMode = data.auth_mode || 'derived_token';
                const body = new URLSearchParams({ username: username });
                if (authMode === 'legacy_password') {
                    body.set('password', password);
                } else {
                    body.set('auth_token', storageKey);
                    body.set('enc_key', storageKey);
                }
                if (remember) {
                    body.set('remember_device', 'on');
                }

                $('#password').val('');

                const loginResp = await fetch('/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                    body: body.toString()
                });
                if (!loginResp.ok) {
                    const message = await loginResp.text();
                    throw new Error(message || 'Login failed');
                }

                storeAuth(username, storageKey, storageKey, remember, authMode);
                window.location.href = '/';
            } catch (err) {
                console.error('Client-side login failed', err);
                clearStoredAuth();
                form.submit();
            }
        });
    </script>
</body>
</html>
