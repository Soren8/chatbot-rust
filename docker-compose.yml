name: chatbot

services:
  voice-service:
    build:
      context: ./chatbot-cuda
    restart: always
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ['0']
              capabilities: [gpu]
    volumes:
      - ./chatbot-cuda/data:/app/data
      # Persistent model cache — downloaded once on first startup, reused across rebuilds
      - ./chatbot-cuda/model_cache:/app/model_cache
      - type: bind
        source: ./.config.yml
        target: /app/.config.yml
        read_only: true
        bind:
          create_host_path: false
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5100/health')"]
      interval: 30s
      timeout: 10s
      retries: 10
      # First-run model downloads can take 20–30 min on a slow connection.
      # Warm starts (cache hit) are ready in ~60s.
      start_period: 1800s
    environment:
      CUDA_VISIBLE_DEVICES: "0"
      NEMO_CACHE_DIR: /app/model_cache/nemo

  webserver:
    image: chatbot-rust
    build:
      context: .
      target: prod
      args:
        RUST_BUILD_PROFILE: ${RUST_BUILD_PROFILE:-debug}
    restart: always
    depends_on:
      voice-service:
        condition: service_started
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "80:80"
    volumes:
      - ./data:/app/data
      - type: bind
        source: ./.config.yml
        target: /app/.config.yml
        read_only: true
        bind:
          create_host_path: false
      - ./temp/cargo-registry:/root/.cargo/registry
      - ./temp/cargo-git:/root/.cargo/git
      - ./temp/target-cache:/app/target
    environment:
      # Core app/env settings (values come from host env or .env consumed by Compose)
      SECRET_KEY: ${SECRET_KEY}
      HOST_DATA_DIR: ${HOST_DATA_DIR:-/app/data}
      RUST_LOG: ${LOG_LEVEL:-info}
      CHATBOT_BIND_ADDR: ${CHATBOT_BIND_ADDR:-0.0.0.0:80}
      CHATBOT_STATIC_ROOT: /app/static

      # Service discovery (non-secret defaults for Docker networking)
      VOICE_SERVICE_HOST: ${VOICE_SERVICE_HOST:-voice-service}
      VOICE_SERVICE_PORT: ${VOICE_SERVICE_PORT:-5100}

      # Secrets (from .env)
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      XAI_API_KEY: ${XAI_API_KEY:-}
      BRAVE_API_KEY: ${BRAVE_API_KEY:-}
  tests:
    profiles: ["test"]
    build:
      context: .
      target: test
    working_dir: /app
    command: >-
      bash -lc '
        set -uo pipefail
        LOG_DIR=/var/log/chatbot-tests
        mkdir -p "$${LOG_DIR}"
        LOG_FILE="$${LOG_DIR}/tests-$(date +%Y%m%d-%H%M%S).log"
        exec > >(tee "$${LOG_FILE}") 2>&1
        echo "[tests] writing logs to $${LOG_FILE}"
        cargo test --manifest-path /app/Cargo.toml --workspace -- --nocapture
      '
    environment:
      SECRET_KEY: test_secret_key_for_security_tests
      HOST_DATA_DIR: /app/data
      RUST_LOG: info
    volumes:
      - ./:/app
      - ./temp/test-logs:/var/log/chatbot-tests
      - ./temp/cargo-registry:/root/.cargo/registry
      - ./temp/cargo-git:/root/.cargo/git
      - ./temp/target-cache:/app/target
