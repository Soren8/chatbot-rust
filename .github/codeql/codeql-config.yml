# CodeQL configuration (used by .github/workflows/codeql.yml).
#
# If GitHub "default setup" is still enabled, disable it under
# Settings → Advanced Security → CodeQL to avoid duplicate scans.
#
# Test trees are omitted from analysis so fixture passwords/keys do not
# flood `rust/hard-coded-cryptographic-value` (and similar) alerts. Production
# code is still scanned for that query.
name: chatbot-rust CodeQL config

paths-ignore:
  - "**/target/**"
  - "temp/**"
  - "node_modules/**"
  - "android/**"
  - "static/deps/**"
  - "**/tests/**"
  - "**/test_*.rs"
  - "**/*_test.rs"
  - "**/tests.rs"
